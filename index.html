<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLD Trainer</title>

<style>

body{
  font-family:sans-serif;
}

/* 全体 */
.container{
  display:flex;
  gap:40px;
}

/* 左 */
.left{
  width:60%;
}

/* 右 */
.right{
  width:40%;
}

/* スクランブル */
#scramble{
  font-size:20px;
  margin:10px 0;
}

/* スクランブルリスト */
#scrambleList{
  margin-top:10px;
}

</style>
</head>


<body>

<div class="container">

<!-- 左側 -->
<div class="left">

<h3>Scramble</h3>

<div id="scramble"></div>

<button onclick="newScramble()">New Scramble</button>

<br><br>

<h3>Result Input</h3>

Time
<input id="timeInput" type="number" step="0.01">

Solved
<input id="solvedInput" type="number" min="0">

Attempted
<input id="attemptedInput" type="number" min="0">

Penalty
<input id="penaltyInput" type="number" min="0" value="0">

<button onclick="saveTime()">Save</button>

<br><br> 
  
<h3>Generate Scrambles</h3>

<input id="scrambleCount" type="number" min="1" value="5">
<button onclick="generateManyScrambles()">Generate</button>

<div id="scrambleList"></div>

</div>


<!-- 右側 -->
<div class="right">

<h3>Times</h3>

<div id="timeList"></div>

</div>

</div>


<script src="scramble.js"></script>
<script src="generate.js"></script>
<script src="db.js"></script>

</body>
</html>
